app = "ai-news-aggregator"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"
  context = "backend"

[env]
  DATABASE_PATH = "/data/news.db"
  REFRESH_INTERVAL_MINUTES = "15"
  CORS_ORIGINS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "news_data"
  destination = "/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

services:
  - type: web
    name: ai-news-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    envVars:
      - key: DATABASE_PATH
        value: /data/news.db
      - key: REFRESH_INTERVAL_MINUTES
        value: 15
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://ai-news-frontend.onrender.com,http://localhost:3000"
    disk:
      name: news-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health

  - type: web
    name: ai-news-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    rootDir: .
    envVars:
      - key: API_PROXY_URL
        value: https://ai-news-backend.onrender.com
    env: node
